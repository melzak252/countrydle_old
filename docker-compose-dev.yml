version: '3.8'
services:
  db:
    image: pgvector/pgvector:pg17
    container_name: database
    networks:
      - countrydle
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - ./postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5

  neo4j:
    image: neo4j:latest
    container_name: neo4j
    networks:
      - countrydle
    ports:
      - "7474:7474"
      - "7687:7687"
    environment:
      - NEO4J_AUTH=${NEO4J_USERNAME}/${NEO4J_PASSWORD}
      - NEO4J_PLUGINS=${NEO4J_PLUGINS}
      - NEO4J_dbms_security_procedures_unrestricted=apoc.*,gds.*
      - NEO4J_dbms_security_procedures_allowlist=apoc.*,gds.*
    volumes:
      - ./neo4j_data:/data
      - ./neo4j_logs:/logs
      - ./neo4j_import:/var/lib/neo4j/import
      - ./neo4j_plugins:/plugins
    healthcheck:
      test: ["CMD-SHELL", "wget --quiet --tries=1 --spider http://localhost:7474 || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 5

  backend:
    container_name: server
    build: ./server
    command: uvicorn app:app --host 0.0.0.0 --port 8080
    networks:
      - countrydle
    ports:
      - "8080:8080"
    depends_on:
      db:
        condition: service_healthy
      neo4j:
        condition: service_healthy
    environment:
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - DATABASE_URL=${DATABASE_URL}
      - QUIZ_MODEL=${QUIZ_MODEL}
      - SECRET_KEY=${SECRET_KEY}
      - ALGORITHM=${ALGORITHM}
      - ACCESS_TOKEN_EXPIRE_MINUTES=${ACCESS_TOKEN_EXPIRE_MINUTES}
      - NEO4J_URI=${NEO4J_URI}
      - NEO4J_USERNAME=${NEO4J_USERNAME}
      - NEO4J_PASSWORD=${NEO4J_PASSWORD}
      - EMBEDDING_MODEL=${EMBEDDING_MODEL}
      - EMBEDDING_SIZE=${EMBEDDING_SIZE}
      - EMAIL_USERNAME=${EMAIL_USERNAME}
      - NOREPLY_EMAIL=${NOREPLY_EMAIL}
      - EMAIL_PASSWORD=${EMAIL_PASSWORD}
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID}
      - COUNTRYDLE_CONTEXT_LIMIT=${COUNTRYDLE_CONTEXT_LIMIT:-3}
      - POWIATDLE_CONTEXT_LIMIT=${POWIATDLE_CONTEXT_LIMIT:-3}
      - US_STATEDLE_CONTEXT_LIMIT=${US_STATEDLE_CONTEXT_LIMIT:-3}
      - WOJEWODZTWDLE_CONTEXT_LIMIT=${WOJEWODZTWDLE_CONTEXT_LIMIT:-3}
    volumes:
      - ./server:/usr/src/app
      - ./data:/usr/src/app/data

  frontend:
    container_name: client
    build:
      context: ./client
      args:
        VITE_API_URL: ${VITE_API_URL}
        VITE_RYBBIT_SCRIPT_URL: ${VITE_RYBBIT_SCRIPT_URL}
        VITE_RYBBIT_SITE_ID: ${VITE_RYBBIT_SITE_ID}
        VITE_GOOGLE_ADSENSE_ID: ${VITE_GOOGLE_ADSENSE_ID}
    networks:
      - countrydle
    ports:
      - "5173:80"
    depends_on:
      - backend

volumes:
  qdrant_snapshots:

networks:
  countrydle:
    driver: bridge

